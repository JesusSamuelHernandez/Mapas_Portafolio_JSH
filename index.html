<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expo Slider – Mapas</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    [data-theme="dark"] {
      --bg:     #0f0f0f;
      --nav-bg: #1c1c1c;
      --text:   #ffffff;
      --accent: #2563eb;
      --border: rgba(255,255,255,0.12);
    }
    [data-theme="light"] {
      --bg:     #f0f0f0;
      --nav-bg: #e0e0e0;
      --text:   #111111;
      --accent: #2563eb;
      --border: rgba(0,0,0,0.12);
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }

    #app {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    /* ── Nav ─────────────────────────────────────── */
    .demo-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--nav-bg);
      border-radius: 50px;
      transition: background 0.3s;
      z-index: 10;
      position: relative;
    }

    .demo-nav-segmented {
      display: flex;
      border-radius: 50px;
      border: 1px solid var(--border);
    }

    .demo-nav-segmented button {
      background: transparent;
      border: none;
      color: var(--text);
      padding: 7px 18px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 50px;
      transition: background .2s, color .2s;
    }

    .demo-nav-segmented button.active {
      background: var(--accent);
      color: #fff;
    }

    .demo-nav > button {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      transition: background .2s, border-color .2s, color .2s;
    }

    .demo-nav-rotate {
      width: auto !important;
      padding: 0 16px !important;
    }

    .demo-nav-content.active {
      background: var(--accent) !important;
      border-color: var(--accent) !important;
      color: #fff !important;
    }

    /* ── Swiper wrapper (rotate) ─────────────────── */
    .swiper-expo-wrapper {
      width: 100%;
      transition: transform .5s ease;
    }

    /* ── Swiper ──────────────────────────────────── */
    .swiper-expo {
      width: 100%;
      overflow: visible !important;
    }

    .swiper-expo.swiper-vertical {
      height: 60vh;
    }

    .swiper-slide {
      width: 68vw;
      max-width: 1100px;
      aspect-ratio: 3 / 2;
    }

    .swiper-expo.swiper-vertical .swiper-slide {
      width: 68vw;
      height: 60vh;
      aspect-ratio: unset;
    }

    /* ── Slide internals ─────────────────────────── */
    .expo-container {
      width: 100%;
      height: 100%;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      will-change: transform;
    }

    .expo-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      pointer-events: none;
      will-change: transform, filter;
    }

    .expo-content {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      padding: 28px 32px;
      font-size: clamp(1rem, 2.5vw, 1.75rem);
      font-weight: 800;
      color: #fff;
      background: linear-gradient(
        to top,
        rgba(0,0,0,.65) 0%,
        rgba(0,0,0,.20) 50%,
        transparent     100%
      );
      text-shadow: 0 2px 10px rgba(0,0,0,.5);
      line-height: 1.3;
      will-change: transform, opacity;
      pointer-events: none;
    }

    .swiper-expo.content-hidden .expo-content {
      display: none;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Nav -->
  <nav class="demo-nav">
    <div class="demo-nav-segmented">
      <button data-dir="horizontal" class="active">Horizontal</button>
      <button data-dir="vertical">Vertical</button>
    </div>

    <button class="demo-nav-rotate">Rotate</button>

    <button class="demo-nav-theme" title="Cambiar tema">
      <svg xmlns="http://www.w3.org/2000/svg" height="16" viewBox="0 -960 960 960" width="16" fill="currentColor">
        <path d="M480-280q-83 0-141.5-58.5T280-480q0-83 58.5-141.5T480-680q83 0 141.5 58.5T680-480q0 83-58.5 141.5T480-280ZM200-440H40v-80h160v80Zm720 0H760v-80h160v80ZM440-760v-160h80v160h-80Zm0 720v-160h80v160h-80ZM256-650l-101-97 57-59 96 100-52 56Zm492 496-97-101 53-55 101 97-57 59Zm-98-550 97-101 59 57-100 96-56-52ZM154-212l101-97 55 53-97 101-59-57Z"/>
      </svg>
    </button>

    <button class="demo-nav-content active" title="Mostrar/ocultar texto">
      <svg xmlns="http://www.w3.org/2000/svg" height="16" viewBox="0 -960 960 960" width="16" fill="currentColor">
        <path d="M120-240v-80h480v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/>
      </svg>
    </button>
  </nav>

  <!-- Slider -->
  <div class="swiper-expo-wrapper">
    <div class="swiper swiper-expo">
      <div class="swiper-wrapper">

        <div class="swiper-slide">
          <div class="expo-container">
            <img class="expo-image" src="./docs/Maps/mapas_01_pages-to-jpg-0001.jpg" alt="Mapa 1">
            <div class="expo-content">Cartografía histórica de México</div>
          </div>
        </div>

        <div class="swiper-slide">
          <div class="expo-container">
            <img class="expo-image" src="./docs/Maps/mapas_01_pages-to-jpg-0002.jpg" alt="Mapa 2">
            <div class="expo-content">Exploración y conquista del territorio</div>
          </div>
        </div>

        <div class="swiper-slide">
          <div class="expo-container">
            <img class="expo-image" src="./docs/Maps/mapas_01_pages-to-jpg-0003.jpg" alt="Mapa 3">
            <div class="expo-content">Rutas de expedición colonial</div>
          </div>
        </div>

        <div class="swiper-slide">
          <div class="expo-container">
            <img class="expo-image" src="./docs/Maps/mapas_01_pages-to-jpg-0004.jpg" alt="Mapa 4">
            <div class="expo-content">Demarcaciones y fronteras históricas</div>
          </div>
        </div>

        <div class="swiper-slide">
          <div class="expo-container">
            <img class="expo-image" src="./docs/Maps/mapas_01_pages-to-jpg-0005.jpg" alt="Mapa 5">
            <div class="expo-content">División territorial del virreinato</div>
          </div>
        </div>

        <div class="swiper-slide">
          <div class="expo-container">
            <img class="expo-image" src="./docs/Maps/mapas_02_pages-to-jpg-0001.jpg" alt="Mapa 6">
            <div class="expo-content">Geografía y recursos naturales</div>
          </div>
        </div>

        <div class="swiper-slide">
          <div class="expo-container">
            <img class="expo-image" src="./docs/Maps/mapas_02_pages-to-jpg-0002.jpg" alt="Mapa 7">
            <div class="expo-content">Poblaciones indígenas prehispánicas</div>
          </div>
        </div>

      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
  /* ─── Config ───────────────────────────────────────────── */
  const IMAGE_OFFSET = 1.25;   // inactive slide scale factor
  let vertical = false;
  let contentVisible = true;
  let swiper;

  /* ─── Expo effect ──────────────────────────────────────── */
  function applyEffect(sw) {
    sw.slides.forEach(slide => {
      const p    = Math.max(-1, Math.min(1, slide.progress));
      const absP = Math.abs(p);

      const container = slide.querySelector('.expo-container');
      const image     = slide.querySelector('.expo-image');
      const content   = slide.querySelector('.expo-content');
      if (!container || !image) return;

      // Scale: 1 (active) → IMAGE_OFFSET (inactive)
      const cScale = 1 + (IMAGE_OFFSET - 1) * absP;
      // Image inner scale: 1 → IMAGE_OFFSET * 0.9 (parallax zoom)
      const iScale = 1 + (IMAGE_OFFSET - 1) * 0.5 * absP;

      if (!vertical) {
        /* ── Horizontal ────────────────────────────────────── */
        // Prev slides expand left, next slides expand right
        container.style.transformOrigin = p <= 0 ? 'right center' : 'left center';
        container.style.transform       = `scale(${cScale})`;

        // Image shifts opposite direction to reveal different portion
        image.style.transformOrigin = p <= 0 ? 'left center' : 'right center';
        image.style.transform       = `translateX(${-p * 50}%) scale(${iScale})`;
      } else {
        /* ── Vertical ──────────────────────────────────────── */
        container.style.transformOrigin = p <= 0 ? 'center bottom' : 'center top';
        container.style.transform       = `scale(${cScale})`;

        image.style.transformOrigin = p <= 0 ? 'center top' : 'center bottom';
        image.style.transform       = `translateY(${-p * 50}%) scale(${iScale})`;
      }

      image.style.filter = `grayscale(${absP})`;

      // Text: slide in from side, fade out at |p| = 0.5
      if (content) {
        const tx = -p * 100;
        content.style.transform = vertical
          ? `translateY(${tx}%)`
          : `translateX(${tx}%)`;
        // opacity: 1 at p=0, 0 at |p|≥0.5
        content.style.opacity = String(Math.max(0, 1 - absP * 2));
      }
    });
  }

  function applyTransition(sw, ms) {
    sw.slides.forEach(slide => {
      ['.expo-container', '.expo-image', '.expo-content'].forEach(sel => {
        const el = slide.querySelector(sel);
        if (el) el.style.transitionDuration = ms + 'ms';
      });
    });
  }

  /* ─── Init / reinit ────────────────────────────────────── */
  function initSwiper() {
    if (swiper) swiper.destroy(true, true);

    swiper = new Swiper('.swiper-expo', {
      direction:           vertical ? 'vertical' : 'horizontal',
      slidesPerView:       'auto',
      centeredSlides:      true,
      spaceBetween:        16,
      watchSlidesProgress: true,
      grabCursor:          true,
      keyboard:            { enabled: true },
      on: {
        init:          sw       => { applyTransition(sw, 0); applyEffect(sw); },
        progress:      sw       => applyEffect(sw),
        setTranslate:  sw       => applyEffect(sw),
        setTransition: (sw, ms) => applyTransition(sw, ms),
      },
    });
  }

  initSwiper();

  /* ─── Nav: Horizontal / Vertical ───────────────────────── */
  document.querySelectorAll('[data-dir]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-dir]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      vertical = btn.dataset.dir === 'vertical';
      initSwiper();
    });
  });

  /* ─── Nav: Rotate ──────────────────────────────────────── */
  const wrapEl = document.querySelector('.swiper-expo-wrapper');
  let rotated  = false;

  document.querySelector('.demo-nav-rotate').addEventListener('click', () => {
    rotated = !rotated;
    if (rotated) {
      const scale = window.innerHeight / window.innerWidth;
      wrapEl.style.transform = `rotate(90deg) scale(${scale})`;
    } else {
      wrapEl.style.transform = '';
    }
  });

  /* ─── Nav: Theme ───────────────────────────────────────── */
  document.querySelector('.demo-nav-theme').addEventListener('click', () => {
    const html = document.documentElement;
    html.dataset.theme = html.dataset.theme === 'dark' ? 'light' : 'dark';
  });

  /* ─── Nav: Content toggle ──────────────────────────────── */
  const swiperEl   = document.querySelector('.swiper-expo');
  const contentBtn = document.querySelector('.demo-nav-content');

  contentBtn.addEventListener('click', () => {
    contentVisible = !contentVisible;
    contentBtn.classList.toggle('active', contentVisible);
    swiperEl.classList.toggle('content-hidden', !contentVisible);
  });
</script>
</body>
</html>
